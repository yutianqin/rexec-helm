{{- if and .Values.kubeconfig.createSecret (not .Values.inClusterConfig.enabled) }}
{{- if not .Values.kubeconfig.content }}
{{- fail "deploymentApi.kubeconfig.content must be set when createSecret is true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deployment-api.kubeconfigSecretName" . }}
  labels:
    {{- include "deployment-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.kubeconfig.secretKey }}: |-
{{ .Values.kubeconfig.content | nindent 4 }}
{{- end }}
