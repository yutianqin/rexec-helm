{{- if and .Values.inClusterConfig.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "deployment-api.fullname" . }}
  labels:
    {{- include "deployment-api.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "deployment-api.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "deployment-api.fullname" . }}
{{- end }}
