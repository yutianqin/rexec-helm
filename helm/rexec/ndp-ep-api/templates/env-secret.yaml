{{- if and .Values.envSecret.enabled .Values.envSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.envSecret.name }}
  labels:
    {{- include "ndp-ep-api.labels" . | nindent 4 }}
type: Opaque
{{- $envMap := dict }}
{{- $envFileInput := .Values.envSecret.envFile | default "" }}
{{- $envFileContent := "" }}
{{- if $envFileInput }}
  {{- if or (contains "\n" $envFileInput) (contains "=" $envFileInput) }}
    {{- $envFileContent = $envFileInput }}
  {{- else }}
    {{- $envFileContent = (.Files.Get $envFileInput) }}
    {{- if not $envFileContent }}
      {{- fail (printf "envSecret.envFile '%s' was not found in the chart package. Use a chart-relative path or --set-file epApi.envSecret.envFile=..." $envFileInput) }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if $envFileContent }}
  {{- $lines := splitList "\n" $envFileContent }}
  {{- range $lines }}
    {{- $line := trim . }}
    {{- if and $line (not (hasPrefix "#" $line)) }}
      {{- $parts := regexSplit "=" $line 2 }}
      {{- if eq (len $parts) 2 }}
        {{- $_ := set $envMap (trim (index $parts 0)) (trim (index $parts 1)) }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if .Values.env }}
  {{- $envMap = merge $envMap .Values.env }}
{{- end }}
{{- if $envMap }}
stringData:
  {{- range $key, $value := $envMap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
